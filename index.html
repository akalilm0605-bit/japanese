<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="根据中文释义练习常用日语单词拼写" />
    <title>日语单词拼写练习</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">日本語 · 每日练习</p>
        <h1>日语单词拼写</h1>
        <p class="subtitle">选择单元，逐步完成N5词汇</p>
      </header>

      <section id="unit-selection" class="unit-selection" aria-labelledby="unit-selection-title">
        <div class="section-heading">
          <div>
            <p class="section-kicker">N5 · 674词</p>
            <h2 id="unit-selection-title">选择学习单元</h2>
          </div>
          <p>每单元50词，学习记录会保存在当前浏览器中。</p>
        </div>
        <div id="unit-list" class="unit-list"></div>
      </section>

      <section id="practice-screen" class="practice-screen" hidden>
        <div class="practice-toolbar">
          <div>
            <p id="unit-range" class="section-kicker"></p>
            <h2 id="current-unit-title">第1单元</h2>
          </div>
          <button id="change-unit-button" class="change-unit-button" type="button">更换单元</button>
        </div>

        <section class="scoreboard" aria-label="当前单元练习成绩">
          <div><span id="practiced-count">0/50</span><small>已练单词</small></div>
          <div><span id="correct-count">0</span><small>正确</small></div>
          <div><span id="wrong-count">0</span><small>错误</small></div>
          <div><span id="accuracy">0%</span><small>正确率</small></div>
        </section>

        <section class="quiz-card">
        <div class="question-label">这个词用日语怎么说？</div>
        <div id="meaning" class="meaning" aria-live="polite">加载中…</div>
        <button id="speak-button" class="speak-button" type="button" aria-label="播放日语发音">
          🔊 再听一次
        </button>

        <form id="answer-form" novalidate>
          <label id="answer-label" for="word-input">请分别填写日语汉字和假名</label>
          <div id="answer-fields" class="answer-fields">
            <input
              id="word-input"
              name="word"
              type="text"
              lang="ja"
              inputmode="text"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="汉字：学校"
              aria-label="日语汉字"
            />
            <span id="answer-divider" class="answer-divider" aria-hidden="true">/</span>
            <input
              id="reading-input"
              name="reading"
              type="text"
              lang="ja"
              inputmode="text"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="假名：がっこう"
              aria-label="日语假名"
            />
          </div>
          <p id="input-hint" class="input-hint">中间的“/”已经固定，只需填写两边</p>
          <div class="answer-actions">
            <button id="forget-button" class="forget-button" type="button">忘记了</button>
            <button id="submit-button" class="primary-button" type="submit">提交答案</button>
          </div>
        </form>

        <div id="result" class="result" aria-live="polite" hidden></div>
        <button id="next-button" class="next-button" type="button" hidden>下一题 →</button>
        </section>
      </section>

      <p class="footer-note">不用着急，记住一个词就是一次进步。</p>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
